name: Build and Deploy Simple IIO FM Radio

permissions:
  contents: read

env:
  APP_NAME: iio-fm-radio
  
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - '20[1-9][0-9]_R[1-9]'
      - staging/*
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - '20[1-9][0-9]_R[1-9]' 

jobs:
  identify_version:
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.set_version.outputs.version }}
      can-create-release: ${{ steps.set_version.outputs.can_create_release}}
    steps:
    - name: Checkout code repository
      uses: actions/checkout@v4
    - name: Set app version
      id: set_version
      run: |
        # Regex to match semantic versioning (from semver.org)
        # Regex will match valid version number https://regex101.com/r/jPSdnV/1
        regex='^(v|)((0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?)$'
        app_version=""
        create_release=false
        latest_released_tag=$(curl "https://api.github.com/repos/${{github.repository}}/releases/latest" | jq -r .tag_name)

        if [[ "${{github.ref_type}}" == "tag" ]]; then
            pushed_tag="${{github.ref_name}}"
            if [[ "$pushed_tag" =~ $regex  ]]; then
                app_version="${BASH_REMATCH[2]}"
                if [[ "$latest_released_tag" =~ $regex  ]]; then
                    IFS='.' read -r major minor patch <<< "${BASH_REMATCH[2]}"
                    next_patch="$major.$minor.$((patch + 1))"
                    next_minor="$major.$((minor + 1)).0"
                    next_major="$((major + 1)).0.0"
                    if [[ "$app_version" == "$next_patch" || "$app_version" == "$next_minor" || "$app_version" == "$next_major" ]]; then
                        create_release=true
                    else
                        echo "Valid tag, but invalid version incrementation, release will NOT be created"
                    fi
                else
                    echo "Invalid relesed version, skip incrementation validation! Release will be created"
                    create_release=true
                fi
            else
                echo "Invalid tag format, release will NOT be created"
                app_version=0.0.1+${{ github.sha }}
            fi
        else 
            if [[ "$latest_released_tag" =~ $regex  ]]; then
                app_version=${BASH_REMATCH[2]}+${{ github.sha }}
            else
                echo "Invalid relesed version. Setting default version"
                app_version=0.0.1+${{ github.sha }}
            fi
        fi
        
        echo "Version to use $app_version"
        echo "version=$app_version" >> "$GITHUB_OUTPUT"
        echo "can_create_release=$create_release" >> "$GITHUB_OUTPUT"
  
  build_arm64_native:
    runs-on: ubuntu-24.04-arm
    needs: identify_version
    env:
      architecture: arm64
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker_image: aandrisa/kuiper_basic_64:latest
            distro: kuiper
          - docker_image: arm64v8/debian:trixie
            distro: debian13

    steps:
    - name: Checkout code repository
      uses: actions/checkout@v4
      with:
        path: ${{env.APP_NAME}}

    - name: Start persistent container
      run: |
        docker run -d \
            --name ${{matrix.distro}}-${{env.architecture}} \
            -v "$GITHUB_WORKSPACE/${{env.APP_NAME}}:/workspace/${{env.APP_NAME}}" \
            -w /workspace/${{env.APP_NAME}} \
            ${{matrix.docker_image}} tail -f /dev/null

    - name: Create debian package
      run: |
        docker exec ${{matrix.distro}}-${{env.architecture}} sh -c ".github/scripts/create_debian.sh ${{needs.identify_version.outputs.app-version}}"

    - name: Install application
      run: |
        docker exec ${{matrix.distro}}-${{env.architecture}} sh -c "dpkg -i ../${{env.APP_NAME}}_${{needs.identify_version.outputs.app-version}}-1_${{env.architecture}}.deb"

    - name: Verify install locations
      run: |
        docker exec ${{matrix.distro}}-${{env.architecture}} sh -c ".github/scripts/verify_install.sh"

    - name: Copy debian artifacts from container to host
      run: |
        docker cp ${{matrix.distro}}-${{env.architecture}}:/workspace/. ./artifacts/
        ls -la ./artifacts/

    - name: Upload debian artifacts to github
      uses: actions/upload-artifact@v4
      with:
        name: ${{env.APP_NAME}}-${{matrix.distro}}-${{env.architecture}}
        path: |
          artifacts/*.deb
          artifacts/*.dsc
          artifacts/*.debian.tar.xz
          artifacts/*.orig.tar.gz
        if-no-files-found: error

  build_armhf_native:
    runs-on: ubuntu-24.04-arm
    needs: identify_version
    env:
      architecture: armhf
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker_image: aandrisa/kuiper_basic_32:latest
            distro: kuiper
          - docker_image: arm32v7/debian:trixie
            distro: debian13

    steps:
    - name: Checkout code repository
      uses: actions/checkout@v4
      with:
        path: ${{env.APP_NAME}}

    - name: Start persistent container
      run: |
        docker run -d \
            --platform linux/arm/v7 \
            --name ${{matrix.distro}}-${{env.architecture}} \
            -v "$GITHUB_WORKSPACE/${{env.APP_NAME}}:/workspace/${{env.APP_NAME}}" \
            -w /workspace/${{env.APP_NAME}} \
            ${{matrix.docker_image}} tail -f /dev/null

    - name: Create debian package
      run: |
        docker exec ${{matrix.distro}}-${{env.architecture}} sh -c ".github/scripts/create_debian.sh ${{needs.identify_version.outputs.app-version}}"

    - name: Install application
      run: |
        docker exec ${{matrix.distro}}-${{env.architecture}} sh -c "dpkg -i ../${{env.APP_NAME}}_${{needs.identify_version.outputs.app-version}}-1_${{env.architecture}}.deb"

    - name: Verify install locations
      run: |
        docker exec ${{matrix.distro}}-${{env.architecture}} sh -c ".github/scripts/verify_install.sh"

    - name: Copy debian artifacts from container to host
      run: |
        docker cp ${{matrix.distro}}-${{env.architecture}}:/workspace/. ./artifacts/
        ls -la ./artifacts/

    - name: Upload debian artifacts to github
      uses: actions/upload-artifact@v4
      with:
        name: ${{env.APP_NAME}}-${{matrix.distro}}-${{env.architecture}}
        path: |
          artifacts/*.deb
          artifacts/*.dsc
          artifacts/*.debian.tar.xz
          artifacts/*.orig.tar.gz
        if-no-files-found: error

  build_ubuntu:
    runs-on: ubuntu-latest
    needs: identify_version
    env:
      architecture: amd64
    defaults:
      run:
        working-directory: ${{env.APP_NAME}}
    steps:
    - name: Checkout code repository
      uses: actions/checkout@v4
      with: 
        path: ${{env.APP_NAME}}
        
    - name: Create .deb package
      run: | 
        .github/scripts/create_debian.sh ${{needs.identify_version.outputs.app-version}}

    - name: Install application
      env:
        DEB_FILE_NAME: ${{env.APP_NAME}}_${{needs.identify_version.outputs.app-version}}-1_${{env.architecture}}
      run: |
        sudo dpkg -i ../${{env.DEB_FILE_NAME}}.deb
        
    - name: Verify install locations
      run: |
        .github/scripts/verify_install.sh

    - name: Copy debian artifacts
      run: |
        mkdir -p artifacts
        cp ../*.deb ../*.dsc ../*.debian.tar.xz ../*.orig.tar.gz artifacts/
        ls -la artifacts/

    - name: Upload debian artifacts to github
      uses: actions/upload-artifact@v4
      with:
        name: ${{env.APP_NAME}}-ubuntu
        path: |
          ${{env.APP_NAME}}/artifacts/*.deb
          ${{env.APP_NAME}}/artifacts/*.dsc
          ${{env.APP_NAME}}/artifacts/*.debian.tar.xz
          ${{env.APP_NAME}}/artifacts/*.orig.tar.gz
        if-no-files-found: error

  create_release_from_tag:
    needs:
      - build_arm64_native
      - build_armhf_native
      - build_ubuntu
      - identify_version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{needs.identify_version.outputs.can-create-release == 'true'}}
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true
    - name: Release
      uses: ncipollo/release-action@v1
      with:
        token: ${{secrets.TOKEN_GITHUB}}
        name: Release ${{github.ref_name}}
        artifacts: "*.deb,*.dsc,*.debian.tar.xz,*.orig.tar.gz"
